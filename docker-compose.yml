services:
  frontend:
    container_name: frontend-coldcraft
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_AT: ${BUILD_AT:-unknown}
    env_file: .env.production
    networks:
      - infra_network
    restart: unless-stopped

networks:
  infra_network:
    external: true
